# Sovereignty regression: `tofu init` on the runner must NOT reach
# registry.opentofu.org or github.com. The bpg/proxmox provider is
# vendored via a Nix-built filesystem_mirror (see
# framework/nix/lib/bpg-proxmox-provider.nix). The test builds the
# provider derivation itself via `nix build`, so this job is
# self-contained and does not depend on the cicd image having been
# rebuilt with the new TF_CLI_CONFIG_FILE env. It points HTTPS_PROXY
# at a dead address and runs `tofu init` with both -upgrade=false
# and -upgrade=true to verify both code paths stay offline.
validate:sovereign-tofu-init:
  stage: validate
  interruptible: true
  tags: [infra]
  # Shares ci-tofu-provider with validate:cicd-memory-ballooning: both build the
  # bpg-proxmox-provider derivation, and serializing the two flake evals keeps them
  # off each other's back on the runner. See that job for the full rationale.
  resource_group: ci-tofu-provider
  script:
    - bash tests/test_sovereign_tofu_init.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

# The R1 proof obligation: the memory seam is a byte-identical no-op for the
# non-ballooned consumers of proxmox-vm-field-updatable — gitlab (PRECIOUS) and
# workstation. The test renders a real `tofu show -json` and FAILS (never skips)
# if it cannot, so it needs `tofu` + `nix` + the vendored bpg provider — the same
# three things validate:sovereign-tofu-init already depends on here.
#
# resource_group: it builds the bpg-proxmox-provider derivation, which means a
# flake eval. validate:sovereign-tofu-init builds the SAME derivation and both sit
# in the `validate` stage, so without a group they can flake-eval concurrently on
# the very runner whose OOM this sprint exists to fix. They are not "pigs" (that is
# ci-heavy-nix-eval, pinned to exactly two jobs by test_ci_memory_safety_rules.sh),
# so they get their own group and simply take turns.
validate:cicd-memory-ballooning:
  stage: validate
  interruptible: true
  tags: [infra]
  resource_group: ci-tofu-provider
  script:
    - bash tests/test_cicd_memory_ballooning.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

# Drift guard: the bpg/proxmox version must stay consistent across
# the vendored Nix derivation, versions.tf, and .terraform.lock.hcl.
# A future bump that updates only some of them would fail tofu init
# in a confusing way; this test catches drift early.
validate:bpg-proxmox-version-drift:
  stage: validate
  interruptible: true
