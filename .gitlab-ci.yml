# Issue #297: regression for the publish-to-github oid parser. Locks in
# that ls-remote stderr capture (e.g., SSH "Warning: Permanently added")
# is rejected before reaching git push --force-with-lease.
validate:publish-to-github-oid-parser:
  stage: validate
  tags: [infra]
  script:
    - bash tests/test_publish_to_github_oid_parser.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

# Ratchets that the publish-test harnesses remain hermetic against the
# per-run GITHUB_PUBLISH_ALLOW_INITIAL_REWRITE variable. The first prod-publish
# run sets that variable pipeline-wide; if a future change drops the unset
# from the test scripts, this job would fail by re-exhibiting the pipeline 845
# leakage signature.
validate:publish-tests-env-isolation:
  stage: validate
  tags: [infra]
  variables:
    GITHUB_PUBLISH_ALLOW_INITIAL_REWRITE: "1"
  script:
    - bash tests/test_publish_failure_classification.sh
    - bash tests/test_publish_filter.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

