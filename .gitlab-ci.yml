# .gitlab-ci.yml — Infrastructure CI/CD pipeline.
#
# Two-tier deployment model (architecture.md section 10.3):
# Tier 1 (pipeline): Data-plane VMs — DNS, Vault, Pebble, Gatus, apps.
# Tier 2 (workstation): Control-plane VMs — GitLab, CI/CD runner, PBS.
# The pipeline builds ALL roles (verifies buildability) but only deploys
# data-plane targets. Control-plane images are built and uploaded, ready
# for the operator to activate from the workstation.
#
# Branch model (architecture.md section 13.3):
# dev branch push  → build + upload + deploy-dev + test-dev
# prod branch push → build + upload + deploy-prod + test-prod
# MR (any target)  → validate + build (no deploy)
# Other branches   → no pipeline
#
# Runner: shell executor with all infrastructure tools (nix, tofu, sops, etc.)
# Secrets: SOPS age key at /run/secrets/sops/age-key on the runner VM.

# Prevent duplicate pipelines: only run for MR events or dev/prod pushes.
# Feature branch pushes without an MR produce no pipeline.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - validate
  - build
  - deploy-dev
  - test-dev
  - deploy-prod
  - test-prod

variables:
  SOPS_AGE_KEY_FILE: /run/secrets/sops/age-key

# --- Validate ---

validate:plan:
  stage: validate
  tags: [infra]
  script:
    - echo "=== OpenTofu Init ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - echo "=== OpenTofu Validate ==="
    - framework/scripts/tofu-wrapper.sh validate
    - echo "=== OpenTofu Plan ==="
    - |
      IMAGE_VERSIONS="site/tofu/image-versions.auto.tfvars"
      if [[ ! -f "$IMAGE_VERSIONS" ]] || grep -q "Placeholder" "$IMAGE_VERSIONS" 2>/dev/null; then
        echo "image-versions.auto.tfvars not available (validate stage runs before build)."
        echo "Plan would show phantom drift for every VM. Skipping."
        echo "Accurate plan runs in the deploy stage with real image versions."
      else
        framework/scripts/tofu-wrapper.sh plan -no-color
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:config:
  stage: validate
  tags: [infra]
  script:
    - echo "=== Config syntax check ==="
    - yq e '.' site/config.yaml > /dev/null
    - echo "Config YAML is valid"
    - echo "=== Zone file syntax check ==="
    - for f in site/dns/zones/*.yaml; do [ -f "$f" ] && yq e '.' "$f" > /dev/null; done || true
    - echo "All zone files valid"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:source-filter:
  stage: validate
  tags: [infra]
  script:
    - framework/scripts/check-source-filter.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:nix-checks:
  stage: validate
  tags: [infra]
  script:
    - nix build .#checks.x86_64-linux.source-filter --no-link
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:rebuild-branch-guard:
  stage: validate
  tags: [infra]
  script:
    - bash tests/test_rebuild_branch_guard.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

# Guard: block prod MRs if control-plane images have drifted.
# The pipeline cannot deploy Tier 2 VMs (it runs on them). If the MR
# changes their images, the operator must deploy from the workstation
# first, then retry this job. Uses nix eval (no build needed).
guard:control-plane:
  stage: validate
  tags: [infra]
  script:
    - framework/scripts/check-control-plane-drift.sh
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "prod"

# --- Build ---

build:images:
  stage: build
  tags: [infra]
  script:
    - echo "=== Building all NixOS images ==="
    - framework/scripts/build-all-images.sh
    - echo "=== Generating Gatus config ==="
    - mkdir -p site/gatus
    - framework/scripts/generate-gatus-config.sh > site/gatus/config.yaml
  artifacts:
    paths:
      - site/tofu/image-versions.auto.tfvars
      - site/gatus/config.yaml
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

# --- Deploy Dev ---

deploy:dev:
  stage: deploy-dev
  tags: [infra]
  dependencies:
    - build:images
  script:
    - echo "=== Pre-deploy backup ==="
    - |
      FIRST_NODE=$(yq -r '.nodes[0].mgmt_ip' site/config.yaml)
      PBS_REGISTERED=$(ssh -n -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o BatchMode=yes \
        "root@${FIRST_NODE}" "pvesm status 2>/dev/null | grep -c pbs-nas" 2>/dev/null || echo "0")
      if framework/scripts/backup-now.sh; then
        echo "Pre-deploy backup complete"
      elif [[ "$PBS_REGISTERED" -gt 0 ]]; then
        echo "FATAL: PBS is configured but backup failed. Refusing to deploy." >&2
        echo "Fix the backup failure before deploying." >&2
        exit 1
      else
        echo "WARNING: PBS not yet configured — skipping pre-deploy backup"
        echo "This is expected on first deploy."
      fi
    - echo "=== Deploying to dev ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - framework/scripts/ensure-app-secrets.sh
    - framework/scripts/safe-apply.sh dev
    - echo "=== Restoring recreated precious-state VMs ==="
    - framework/scripts/restore-after-deploy.sh dev
    - echo "=== Cleaning stale replication ==="
    - framework/scripts/configure-replication.sh "*"
    - echo "=== Post-deploy recovery ==="
    - framework/scripts/post-deploy.sh dev
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

# --- Test Dev ---

test:dev:
  stage: test-dev
  tags: [infra]
  script:
    - echo "=== Validating dev deployment ==="
    - framework/scripts/validate.sh --regression-safe dev
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"

regression:
  stage: test-dev
  tags: [infra]
  script:
    - echo "=== Full regression suite ==="
    - framework/scripts/validate.sh --regression dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# --- Deploy Prod ---

deploy:prod:
  stage: deploy-prod
  tags: [infra]
  dependencies:
    - build:images
  script:
    - echo "=== Pre-deploy backup ==="
    - |
      FIRST_NODE=$(yq -r '.nodes[0].mgmt_ip' site/config.yaml)
      PBS_REGISTERED=$(ssh -n -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o BatchMode=yes \
        "root@${FIRST_NODE}" "pvesm status 2>/dev/null | grep -c pbs-nas" 2>/dev/null || echo "0")
      if framework/scripts/backup-now.sh; then
        echo "Pre-deploy backup complete"
      elif [[ "$PBS_REGISTERED" -gt 0 ]]; then
        echo "FATAL: PBS is configured but backup failed. Refusing to deploy." >&2
        echo "Fix the backup failure before deploying." >&2
        exit 1
      else
        echo "WARNING: PBS not yet configured — skipping pre-deploy backup"
        echo "This is expected on first deploy."
      fi
    - echo "=== Deploying to prod ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - framework/scripts/ensure-app-secrets.sh
    - framework/scripts/safe-apply.sh prod
    - echo "=== Restoring recreated precious-state VMs ==="
    - framework/scripts/restore-after-deploy.sh prod
    - echo "=== Cleaning stale replication ==="
    - framework/scripts/configure-replication.sh "*"
    - echo "=== Post-deploy recovery ==="
    - framework/scripts/post-deploy.sh prod
  rules:
    - if: $CI_COMMIT_BRANCH == "prod"

# --- Test Prod ---

test:prod:
  stage: test-prod
  tags: [infra]
  script:
    - echo "=== Validating prod deployment ==="
    - framework/scripts/validate.sh --regression-safe prod
  rules:
    - if: $CI_COMMIT_BRANCH == "prod"
