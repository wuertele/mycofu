# --- Build ---

# Per-role image builds run in parallel — runner concurrent=8 (Sprint 030 C001)
# lets up to 8 of these execute simultaneously. Sprint 030 C002 fan-out.
# HIL boot is deliberately excluded from this matrix and built later in
# build:image:hil-boot because its image embeds six remastered installer ISOs
# and needs much more /nix scratch headroom than the ordinary role images.
#
# IMPORTANT: the matrix list is the source of truth for ordinary roles built
# in parallel. HIL boot is the heavyweight exception below. Together these
# jobs MUST stay in sync with the union of framework/images.yaml,
# site/images.yaml, and enabled apps in site/applications.yaml.
# merge-image-versions.sh fails loudly on drift (missing or unexpected
# fragments) — that catches forgotten updates.
#
# NOTE: this matrix assumes every role has category: nix. If a role with
# category: external is added to a manifest, the per-role job will fail
# (build-image.sh will look for a missing .nix file) — extend the script
# below to read the manifest's category field and dispatch to
# build-image.sh --external when needed. No current role uses Category B,
# so the dispatch is deferred until the first one lands.
# A SIGKILLed measure:build-at-floor runs neither its trap nor its after_script, so
# a `--runtime` MemoryMax clamp on the SHARED nix-daemon can outlive it (until the
# next reboot). Every job that builds THROUGH that daemon heals it first. The
# marker file exists only while a clamp is outstanding, so this is a no-op on every
# ordinary run. One implementation, referenced by each job that needs it.
.heal-stranded-nix-daemon-clamp: &heal_stranded_nix_daemon_clamp
  - framework/scripts/measure-build-orchestrate.sh heal

#
# --- Sprint 046 R2: measure the capability floor (Deviation D1) ---
#
# Both jobs below are `when: manual` and MUST stay that way. They are the
# instruments that produce the memory floor; the real measurement run is
# coordinated by the operator on an IDLE runner (a concurrent build inflates the
# daemon's working set and skews the peak). Nothing here runs automatically.
#
# D1: cicd runs Nix in multi-user DAEMON mode, so an image build's memory lives in
# the cgroup system.slice/nix-daemon.service, NOT in the CI job's process tree.
# Wrapping the build with /usr/bin/time -v would measure the thin RPC client and
# report a catastrophically understated floor. measure-build-peak-rss.sh samples
# the daemon cgroup (plus the runner cgroup, where the evaluator runs).
measure:build-peak-rss:
  stage: build
  tags: [infra]
  # No `interruptible:` key — absence is non-interruptible (the repo bans an
  # explicit `false`; see tests/test_ci_pipeline_autocancel.sh, where `^measure:`
  # is also in the unsafe-family ratchet). A manual measurement must never be
  # auto-cancelled mid-build by a new commit.
  dependencies: []
  # Its OWN resource_group, not `ci-heavy-nix-eval`: joining that group would
  # widen the confinement ratchet in tests/test_ci_memory_safety_rules.sh (which
  # exists to catch silent over-serialization, and which R5 must still pass
  # unchanged). Idleness is not something a resource_group can assert anyway —
  # ordinary build:image jobs are in per-role groups and would still run. The
  # sampler's --max-baseline-mib preflight is what actually enforces it, and it
  # refuses BEFORE burning a rebuild.
  resource_group: measure-build-peak-rss
  variables:
    # Every role the pipeline builds. Which one is heaviest is this job's OUTPUT,
    # not its input, so the default must not pre-judge it. `hil-boot` is omitted
    # only because it needs its own NIX_CONFIG and HIL fixtures (see
    # build:image:hil-boot); add it explicitly when HIL is configured.
    MEASURE_ROLES: "dns vault gitlab cicd acme-dev gatus testapp influxdb grafana roon"
    # THE WARM-STORE TRAP, and why NOT --rebuild (#571). `nix build` on an
    # already-valid output path spawns no builder and returns in seconds; the
    # daemon would be sampled at IDLE and that number would become the floor.
    # The old fix was `nix build --rebuild --option enforce-determinism false`,
    # but --rebuild REBUILDS AND COMPARES for reproducibility, and image
    # derivations (make-disk-image → qcow2) are non-bit-reproducible — the compare
    # fails and errors the job before any number is produced, and
    # `enforce-determinism false` does not reliably downgrade that mismatch for
    # this derivation. So the orchestrator EVICTS the cached output first
    # (measure-build-orchestrate.sh:evict_output) and then runs a PLAIN build with
    # no comparison; MEASURE_NIX_FLAGS is therefore empty. The sampler's
    # --min-delta-mib gate remains the fail-closed backstop if eviction is pinned.
    MEASURE_NIX_FLAGS: ""
    # Refuse to measure if the daemon is already busy (i.e. the runner is not idle).
    MEASURE_MAX_BASELINE_MIB: "1024"
    # Full nix parallelism by default — the worst case, and an upper bound on
    # production, which runs build:image with NIX_BUILD_CORES=4. The reduced re-run
    # demanded by Phase 2's escalation path ("If the measured peak exceeds the
    # survivor bound") is this SAME job with MEASURE_NIX_MAX_JOBS=1, MEASURE_NIX_CORES=4.
    MEASURE_NIX_MAX_JOBS: ""
    MEASURE_NIX_CORES: ""
  # The orchestration — starting the socket-activated daemon, the unmeasured
  # pre-realise, the per-role loop that does not abandon roles 2..N when role 1
  # stumbles, and the anon_available assertion — lives in
  # framework/scripts/measure-build-orchestrate.sh, where it can be syntax-checked
  # and unit-tested. This job is a thin caller.
  #
  # The measured command there is a bare `nix build`, NOT build-image.sh: that
  # script ends by calling upload-image.sh, which SCPs the image to EVERY Proxmox
  # node, and this job is runner-local by contract ("existing workload, existing
  # runner — no cluster mutation, no live experiment"). Nothing is lost — everything
  # build-image.sh adds after the build runs OUTSIDE nix-daemon and contributes
  # nothing to the peak.
  script:
    - framework/scripts/measure-build-orchestrate.sh peak-rss
  artifacts:
    when: always
    paths:
      - build/peak-rss.json
      - build/peak-rss/
    expire_in: 1 month
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"
      when: manual
      allow_failure: true

# The CAPABILITY check (V2.2): does the heaviest build COMPLETE with the daemon
# clamped to the candidate floor? A peak number alone cannot answer that.
#
# This job MUTATES A SHARED SERVICE (nix-daemon.service).
#   - The restore is owned by an in-script `trap ... EXIT INT TERM HUP` that writes
#     back the value CAPTURED at job start, NOT a hardcoded `infinity`. (R5's
#     PRODUCTION backstop is on gitlab-runner.service, not the daemon — Deviation
#     D1's measured correction. This nix-daemon clamp is a MANUAL, DEFERRED
#     measurement clamp only; restoring the captured value keeps it from leaking
#     past the job, and a blind `infinity` could clobber any future daemon setting.)
#   - The captured value is also persisted to /run, so `after_script` (a backstop
#     for paths where the trap does not fire) and `before_script` (which clears a
#     clamp stranded by a SIGKILLed previous run) restore the SAME value.
#   - A `--runtime` property is dropped at reboot, so the worst-case blast radius
#     is bounded by the next cicd reboot — but a stranded clamp would OOM every
#     build until then, hence the belt and braces.
measure:build-at-floor:
  stage: build
  tags: [infra]
  # No `interruptible:` key — see measure:build-peak-rss.
  dependencies: []
  resource_group: measure-build-at-floor
  variables:
    # The candidate floor (T2.4 provisional: 8192 — fits pve03's ~11.6 GiB
    # available). Set MEASURE_ROLE to whichever role measure:build-peak-rss
    # actually reported as heaviest.
    MEASURE_FLOOR_MB: "8192"
    # Reconciled with the runtime backstop (MR-4): the runner budget's
    # MemoryMax = floorMb - osReserveMb = 8192 - 1024 = 7168. The proof MUST clamp
    # to the SAME 7168 MiB, or a build peaking in 7168..7680 passes this proof and
    # is then OOM-killed in production. osReserveMb is 1024 in
    # framework/nix/modules/gitlab-runner.nix; keep the two equal.
    MEASURE_OS_RESERVE_MB: "1024"
    MEASURE_ROLE: "gitlab"
    MEASURE_MAX_BASELINE_MIB: "1024"
    # Empty: the measured build is forced real by output eviction, not --rebuild
    # (#571 — see measure:build-peak-rss and evict_output).
    MEASURE_NIX_FLAGS: ""
    PRIOR_MEMORY_MAX_FILE: "/run/mycofu-measure-prior-memory-max"
  # The orchestration — the idle preflight, the MemoryMax capture, the clamp, the
  # trap-owned restore of the CAPTURED value, the OOM-vs-unrelated-failure verdict,
  # and the budget assertion — lives in
  # framework/scripts/measure-build-orchestrate.sh. It is privileged,
  # failure-mode-dense logic that must be unit-testable; see
  # tests/test_measure_build_orchestrate.sh.
  before_script: *heal_stranded_nix_daemon_clamp
  script:
    - framework/scripts/measure-build-orchestrate.sh at-floor
  after_script:
    # Backstop only — the in-script trap is the primary restore. It writes back the
    # CAPTURED daemon value, never a hardcoded `infinity`. (R5's production backstop
    # is on gitlab-runner.service, not the daemon — D1's measured correction; this is
    # the manual at-floor daemon clamp, and a blind infinity could clobber a future
    # daemon-level setting and always undoes the captured-value restore.)
    - framework/scripts/measure-build-orchestrate.sh restore-backstop
  artifacts:
    when: always
    paths:
      - build/peak-rss/
    expire_in: 1 month
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
      when: manual
      allow_failure: true
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"
      when: manual
      allow_failure: true

build:image:
  stage: build
  interruptible: true
  tags: [infra]
  # resource_group serializes build:image:[ROLE] across concurrent pipelines.
  # Uploads are append-only; off-hot-path reclaim has its own single-writer job.
  resource_group: build-image-${ROLE}
  variables:
    # 8 parallel jobs × 4 cores each = 32 thread budget on a 12-vCPU runner.
    # Mild oversubscription is fine; nix builds are partially I/O-bound.
    NIX_BUILD_CORES: "4"
  parallel:
    matrix:
      - ROLE:
          - dns
          - vault
          - gitlab
          - cicd
          - acme-dev
          - gatus
          - testapp
          - influxdb
          - grafana
          - roon
  before_script: *heal_stranded_nix_daemon_clamp
  script:
    - echo "=== Building ${ROLE} ==="
    - HOST_CONFIG="site/nix/hosts/${ROLE}.nix"
    - framework/scripts/build-image.sh "$HOST_CONFIG" "$ROLE"
    - rm -rf build/image-versions
    - mkdir -p build/image-versions
    - grep -E "^[[:space:]]*\"${ROLE}\"[[:space:]]*=" site/tofu/image-versions.auto.tfvars > "build/image-versions/${ROLE}.tfvars-fragment"
    - cat "build/image-versions/${ROLE}.tfvars-fragment"
    - |
      if [ "$ROLE" = "gitlab" ] || [ "$ROLE" = "cicd" ]; then
        echo "=== Building system closure: ${ROLE} ==="
        nix build --print-out-paths \
          --out-link "build/closure-${ROLE}" \
          ".#nixosConfigurations.${ROLE}.config.system.build.toplevel" \
          > "build/closure-path-${ROLE}.txt"
        cat "build/closure-path-${ROLE}.txt"
        # Issue #573: pin THIS control-plane closure with a durable per-pipeline
        # Nix GC root the instant it is built — before nix's automatic min-free
        # GC can reclaim it in the build:image -> build:merge window (dev
        # pipeline 1509, all-image rebuild under store pressure). Reuses the
        # gitlab/cicd gate above (no new hardcoding) and passes $ROLE
        # dynamically. build:merge re-registers as defense-in-depth; the pin is
        # idempotent.
        framework/scripts/ci-pipeline-gcroot.sh register-closure "$ROLE" "$(cat "build/closure-path-${ROLE}.txt")"
      fi
  artifacts:
    paths:
      - build/image-versions/
      - build/closure-gitlab
      - build/closure-cicd
      - build/closure-path-gitlab.txt
      - build/closure-path-cicd.txt
    expire_in: 4 hours
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

prepare:cicd-storage:
  stage: prepare-heavy
  tags: [infra]
  dependencies: []
  script:
    - |
      case "${CI_COMMIT_BRANCH:-}" in
        dev) framework/scripts/deploy-control-plane.sh dev --ensure-cicd-storage-only ;;
        prod) framework/scripts/deploy-control-plane.sh prod --ensure-cicd-storage-only ;;
        *) echo "Not a deployment branch; skipping CICD storage preparation" ;;
      esac
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - job_execution_timeout
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

build:image:hil-boot:
  stage: build-heavy
  interruptible: true
  tags: [infra]
  # Same race-safety treatment as build:image. See its block for rationale.
  resource_group: build-image-hil-boot
  needs:
    - job: "build:image"
      artifacts: false
    - job: "prepare:cicd-storage"
      artifacts: false
      optional: true
  variables:
    ROLE: hil-boot
    # HIL boot embeds six per-node ISO artifacts; keep it off the general
    # image-build fan-out so make-disk-image/cptofs has enough /nix headroom.
    NIX_BUILD_CORES: "4"
    NIX_CONFIG: |
      build-dir = /nix/tmp
      min-free = 8589934592
      max-free = 34359738368
    # build:image:hil-boot is a standalone job (no parallel:matrix), so the
    # helper must query the literal job name when fetching dev/prod
    # tfvars-fragment artifacts.
    MYCOFU_UPLOAD_HELPER_JOB_NAME: "build:image:hil-boot"
  before_script: *heal_stranded_nix_daemon_clamp
  script:
    - echo "=== Building ${ROLE} ==="
    - HOST_CONFIG="site/nix/hosts/${ROLE}.nix"
    - framework/scripts/build-image.sh "$HOST_CONFIG" "$ROLE"
    - rm -rf build/image-versions
    - mkdir -p build/image-versions
    - grep -E "^[[:space:]]*\"${ROLE}\"[[:space:]]*=" site/tofu/image-versions.auto.tfvars > "build/image-versions/${ROLE}.tfvars-fragment"
    - cat "build/image-versions/${ROLE}.tfvars-fragment"
    # R3/#582: xorriso content assertion for the hil-boot per-node ISO
    # (canonical answer.toml + auto-installer-mode.toml embedded). Runs
    # inline against the warm /nix/store from build-image.sh above — the
    # hil-boot image build has already realized all six per-node ISOs,
    # so this nix build reuses the same fetchurl and paia outputs and
    # the xorriso inspection completes in ~10-20 s. Collapsing the old
    # build:hil-boot-iso-real job into this one removes a build-heavy
    # -> build-merge stage barrier without weakening the assertion:
    # the test file is unchanged and remains independently runnable
    # for local dev / debugging.
    - bash tests/test_hil_boot_iso_real_build.sh
  artifacts:
    paths:
      - build/image-versions/
    expire_in: 4 hours
  rules: *hil_configured_rules

build:merge:
  stage: build-merge
  tags: [infra]
  needs:
    - job: "build:image"
      artifacts: true
    - job: "prepare:cicd-storage"
      artifacts: false
      optional: true
    - job: "build:image:hil-boot"
      artifacts: true
      optional: true
  script:
    - echo "=== Merging per-role image fragments ==="
    - framework/scripts/merge-image-versions.sh
    # R8/#560: pin each to-be-deployed control-plane closure with a durable
    # per-pipeline Nix GC root so cicd's daily nix.gc.timer cannot reclaim it in
    # the window before deploy:control-plane:* consumes it by store path. Also
    # sweeps roots orphaned by pipelines that died between build and deploy.
    - echo "=== Pinning control-plane deploy closures (R8/#560) ==="
    - framework/scripts/ci-pipeline-gcroot.sh register
    - echo "=== Generating Gatus config ==="
    - mkdir -p site/gatus
    # Issue #528: do NOT pass GATUS_GITHUB_EXPECTED_SOURCE_COMMIT. The
    # value must be the tip of the published (prod) branch — NOT this
    # pipeline's $CI_COMMIT_SHA (which is the dev/MR/feature tip). The
    # env-var-unset path in generate-gatus-config.sh calls the shared
    # resolver (github-publish-lib.sh:resolve_gatus_expected_source_commit),
    # which agrees with rebuild-cluster.sh. Setting the env var here again
    # would reintroduce the CIDATA-churn defect.
    - framework/scripts/generate-gatus-config.sh > site/gatus/config.yaml
  artifacts:
    paths:
      - build/closure-paths.json
      - build/closure-gitlab
      - build/closure-cicd
      - site/tofu/image-versions.auto.tfvars
      - site/gatus/config.yaml
    expire_in: 4 hours
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

reclaim:image-store:
  stage: reclaim-image-store
  tags: [infra]
  # Shares the same per-role lock as build:image and build:image:hil-boot.
  # A reclaim shard cannot delete from a role's image store while that role's
  # upload job is publishing a new image.
  resource_group: build-image-${ROLE}
  parallel:
    matrix:
      - ROLE:
          - dns
          - vault
          - gitlab
          - cicd
          - acme-dev
          - gatus
          - testapp
          - influxdb
          - grafana
          - roon
          - hil-boot
  script:
    - framework/scripts/reclaim-images.sh --apply --role "$ROLE"
  rules:
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
    - if: $CI_PIPELINE_SOURCE == "web" && $RECLAIM_IMAGE_STORE == "1"

# --- Deploy Dev ---

deploy:dev:
  stage: deploy-dev
  tags: [infra]
  dependencies:
    - build:merge
  variables:
    PIN_FILE: "build/restore-pin-dev.json"
  script:
    - echo "=== Pre-deploy VM topology gate ==="
    - framework/scripts/pre-deploy-vm-completeness-gate.sh --env dev --repair-pin build/repair-pin-dev.json
    - echo "=== Pre-deploy backup ==="
    - |
      FIRST_NODE=$(yq -r '.nodes[0].mgmt_ip' site/config.yaml)
      PBS_REGISTERED=$(ssh -n -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o BatchMode=yes \
        "root@${FIRST_NODE}" "pvesm status 2>/dev/null | grep -c pbs-nas" 2>/dev/null || echo "0")
      if framework/scripts/backup-now.sh --env dev --pin-out "$PIN_FILE"; then
        echo "Pre-deploy backup complete"
      elif [[ "$PBS_REGISTERED" -gt 0 ]]; then
        echo "FATAL: PBS is configured but backup failed. Refusing to deploy." >&2
        echo "Fix the backup failure before deploying." >&2
        exit 1
      else
        echo "WARNING: PBS not yet configured — skipping pre-deploy backup"
        echo "This is expected on first deploy."
      fi
    - echo "=== Deploying to dev ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - framework/scripts/ensure-app-secrets.sh
    # safe-apply.sh runs stopped apply -> restore-before-start -> start apply,
    # then post-success convergence. Phase 1 failures use
    # restore-before-start --recovery-mode (#224).
    - framework/scripts/safe-apply.sh dev
    # Post-deploy: FAIL if any bulk restore/park artifact was under-populated
    # (#518). No-op when no atomic/bulk artifacts were produced (safe-apply's
    # single-env path is gated at runtime inside restore-before-start.sh).
    - framework/scripts/check_bulk_artifacts_populated.sh --build-dir build
    - echo "=== Deploying workstation dev closure ==="
    - framework/scripts/deploy-workstation-closure.sh dev
  artifacts:
    when: always
    name: "deploy-dev-$CI_JOB_ID"
    paths:
      - build/restore-pin-dev.json
      - build/repair-pin-dev.json
      - build/preboot-restore-*.json
      - build/preboot-restore-status-*.json
      - build/vdb-park-status-*.json
      - build/first-deploy-allow-*.json
    expire_in: 1 month
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"

# --- Deploy Control Plane Dev ---

deploy:control-plane:gitlab:dev:
  stage: deploy-control-plane-dev
  tags: [infra]
  dependencies:
    - build:merge
  script:
    - echo "=== Deploying control-plane closure to gitlab (dev pipeline) ==="
    - framework/scripts/deploy-control-plane.sh dev gitlab
    # R8/#560: closure consumed — release its pin so GC is not blocked past need.
    - framework/scripts/ci-pipeline-gcroot.sh release gitlab
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"

deploy:control-plane:cicd:dev:
  stage: deploy-control-plane-dev
  tags: [infra]
  needs:
    - job: "deploy:control-plane:gitlab:dev"
      artifacts: false
    - job: "build:merge"
      artifacts: true
  script:
    - echo "=== Deploying control-plane closure to cicd (dev pipeline) ==="
    - framework/scripts/deploy-control-plane.sh dev cicd
    # R8/#560: terminal control-plane deploy — release cicd's pin; the helper
    # then rmdirs the now-empty per-pipeline root dir.
    - framework/scripts/ci-pipeline-gcroot.sh release cicd
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - job_execution_timeout
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"

# --- Converge Dev ---
# Non-destructive cluster-state reconciliation. Two phases:
#   - Phase A (additive, #358): apply missing snippet uploads on all nodes.
#   - Phase B (orphan cleanup, #359): delete on-disk snippets not in
#     tofu state. Empty-expected safety gate refuses mass-delete if state
#     reports zero snippets — see converge-cluster.sh header for details.
# Safe to apply on a running cluster — never touches VM resources.

converge:dev:
  stage: converge-dev
  tags: [infra]
  script:
    # Every tofu-touching job inits first: the shell-executor runner uses
    # concurrent slots, each with its own .terraform/. Without init,
    # converge-cluster.sh's first `tofu show -json` would fail on a
    # fresh slot with "backend initialization required."
    - echo "=== OpenTofu Init ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    # --env dev: Phase A converges dev-deployable snippet modules plus the
    # control plane, which is dev-authoritative (converge scope == deploy
    # scope; control plane converges from dev only). Prod-classified snippets
    # are unreachable from the dev pipeline (#529/#623).
    - echo "=== Converging cluster state — Phase A (snippet upload) then Phase B (orphan delete) ==="
    - framework/scripts/converge-cluster.sh --env dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"

# --- Test Dev ---

test:dev:
  stage: test-dev
  tags: [infra]
  script:
    - echo "=== Validating dev deployment ==="
    - framework/scripts/validate.sh --regression-safe dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"

regression:
  stage: test-dev
  tags: [infra]
  script:
    - echo "=== Full regression suite ==="
    - framework/scripts/validate.sh --regression dev
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule"

bench:scheduled:
  stage: test-dev
  tags: [infra]
  timeout: 3h
  allow_failure: true
  script:
    - |
      # Gate on benchmarks.scheduled.enabled in site/config.yaml. Same pattern
      # as publish:github (see lines ~1962). GitLab evaluates rules at
      # pipeline creation, before any prepare-stage job could populate a
      # dotenv var, so the site opt-in gate must run in-script. Reading
      # config.yaml here keeps the gate inside the same source of truth
      # validate-site-config.sh enforces. A downstream cluster that has not
      # opted in is protected even if a schedule with
      # BENCH_SCHEDULE_KEY=bench-nightly is created in GitLab UI.
      enabled=$(yq -r '.benchmarks.scheduled.enabled // false' site/config.yaml)
      if [[ "${enabled}" != "true" ]]; then
        echo "benchmarks.scheduled.enabled is not true; skipping bench:scheduled." >&2
        exit 0
      fi
    - benchmarks/run-scheduled-bench.sh
  artifacts:
    when: always
    expire_in: 1 month
    paths:
      - build/bench-scheduled/status.json
      - build/bench-scheduled/*.log
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $CI_PIPELINE_SOURCE == "schedule" && $BENCH_SCHEDULE_KEY == "bench-nightly"

# --- Deploy Prod ---

deploy:prod:
  stage: deploy-prod
  tags: [infra]
  dependencies:
    - build:merge
  variables:
    PIN_FILE: "build/restore-pin-prod.json"
  script:
    - echo "=== Pre-deploy backup ==="
    - |
      FIRST_NODE=$(yq -r '.nodes[0].mgmt_ip' site/config.yaml)
      PBS_REGISTERED=$(ssh -n -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o BatchMode=yes \
        "root@${FIRST_NODE}" "pvesm status 2>/dev/null | grep -c pbs-nas" 2>/dev/null || echo "0")
      if framework/scripts/backup-now.sh --env prod --pin-out "$PIN_FILE"; then
        echo "Pre-deploy backup complete"
      elif [[ "$PBS_REGISTERED" -gt 0 ]]; then
        echo "FATAL: PBS is configured but backup failed. Refusing to deploy." >&2
        echo "Fix the backup failure before deploying." >&2
        exit 1
      else
        echo "WARNING: PBS not yet configured — skipping pre-deploy backup"
        echo "This is expected on first deploy."
      fi
    - echo "=== Cert budget preflight ==="
    - framework/scripts/check-cert-budget.sh prod
    - echo "=== Deploying to prod ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - framework/scripts/ensure-app-secrets.sh
    # safe-apply.sh runs stopped apply -> restore-before-start -> start apply,
    # then post-success convergence. Phase 1 failures use
    # restore-before-start --recovery-mode (#224).
    - framework/scripts/safe-apply.sh prod
    # Post-deploy: FAIL if any bulk restore/park artifact was under-populated
    # (#518). No-op when no atomic/bulk artifacts were produced (safe-apply's
    # single-env path is gated at runtime inside restore-before-start.sh).
    - framework/scripts/check_bulk_artifacts_populated.sh --build-dir build
    - echo "=== Deploying workstation prod closure ==="
    - framework/scripts/deploy-workstation-closure.sh prod
  artifacts:
    when: always
    name: "deploy-prod-$CI_JOB_ID"
    paths:
      - build/restore-pin-prod.json
      - build/preboot-restore-*.json
      - build/preboot-restore-status-*.json
      - build/vdb-park-status-*.json
      - build/first-deploy-allow-*.json
    expire_in: 1 month
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

# --- Deploy Control Plane Prod ---

deploy:control-plane:gitlab:prod:
  stage: deploy-control-plane-prod
  tags: [infra]
  dependencies:
    - build:merge
  script:
    - echo "=== Deploying control-plane closure to gitlab (prod pipeline) ==="
    - framework/scripts/deploy-control-plane.sh prod gitlab
    # R8/#560: closure consumed — release its pin so GC is not blocked past need.
    - framework/scripts/ci-pipeline-gcroot.sh release gitlab
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

deploy:control-plane:cicd:prod:
  stage: deploy-control-plane-prod
  tags: [infra]
  needs:
    - job: "deploy:control-plane:gitlab:prod"
      artifacts: false
    - job: "build:merge"
      artifacts: true
  script:
    - echo "=== Deploying control-plane closure to cicd (prod pipeline) ==="
    - framework/scripts/deploy-control-plane.sh prod cicd
    # R8/#560: terminal control-plane deploy — release cicd's pin; the helper
    # then rmdirs the now-empty per-pipeline root dir.
    - framework/scripts/ci-pipeline-gcroot.sh release cicd
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - job_execution_timeout
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

# --- Converge Prod ---
# Same as converge:dev but for the prod pipeline.

converge:prod:
  stage: converge-prod
  tags: [infra]
  script:
    - echo "=== OpenTofu Init ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    # --env prod: Phase A converges ONLY prod-deployable snippet modules
    # (converge scope == deploy scope). Dev/shared and control-plane snippets
    # are unreachable from the prod pipeline — the control plane is
    # dev-authoritative (#529/#623).
    - echo "=== Converging cluster state — Phase A (snippet upload) then Phase B (orphan delete) ==="
    - framework/scripts/converge-cluster.sh --env prod
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

# --- Test Prod ---

test:prod:
  stage: test-prod
  tags: [infra]
  script:
    - echo "=== Validating prod deployment ==="
    - framework/scripts/validate.sh --regression-safe prod
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

publish:github:
  stage: publish-github
  tags: [infra]
  script:
    - |
      # Gate on publish.github.enabled in site/config.yaml. We cannot use a
      # rule like `$PUBLISH_GITHUB_ENABLED == "true"` because GitLab evaluates
      # rules at pipeline creation, before any prepare-stage job could populate
      # a dotenv var. Reading config.yaml here keeps the gate inside the same
      # source of truth that validate-site-config.sh enforces.
      enabled=$(yq -r '.publish.github.enabled // false' site/config.yaml)
      if [[ "${enabled}" != "true" ]]; then
        echo "publish.github.enabled is not true; skipping publish:github." >&2
        exit 0
      fi
    - echo "=== Publishing framework mirror to GitHub ==="
    - framework/scripts/publish-to-github.sh
  artifacts:
    when: always
    paths:
      - build/github-publish-status.json
    expire_in: 1 month
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"
