validate:per-role-isolation:
  stage: validate
  interruptible: true
  resource_group: ci-heavy-nix-eval
  tags: [infra]
  # The probes mutate role-owned files in a worktree (R1 fix git-adds
  # __probe__ files). With staged content, `nix eval .#packages...`
  # treats the source as a `git+file://` flake input and walks parent
  # commits to compute the source rev. The default --depth=20 shallow
  # clone misses ancestors, so eval fails with
  #   error: getting parent of Git commit '...': object not found
  # Full clone is required for these probes to work end-to-end.
  variables:
    GIT_DEPTH: "0"
  script:
    - bash tests/test_per_role_source_isolation.sh
    - bash tests/test_per_role_under_inclusion_fails.sh
    - bash tests/test_per_role_isolation_eval_attribution.sh
  # R6 (#482/#545): docs-only changes cannot affect this nix eval surface.
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *nix_source_surface_changes
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
      changes: *nix_source_surface_changes
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"
      changes: *nix_source_surface_changes

