# Issue #528: assert the gatus github-mirror source-commit resolver
# converges between the CI build:merge invocation and the workstation
# rebuild-cluster.sh invocation. When they diverge, dev pipelines churn
# gatus CIDATA every run.
validate:gatus-source-commit-resolver:
  stage: validate
  interruptible: true
  tags: [infra]
  # Full history is required — the test builds fixture clones and
  # exercises `git ls-remote`; a shallow parent clone still lets ls-remote
  # work against the fixture remote, but full history keeps this job
  # future-proof if the test grows.
  variables:
    GIT_DEPTH: "0"
  script:
    - bash tests/test_gatus_source_commit_resolver.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $RECLAIM_IMAGE_STORE == "1"
      when: never
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

