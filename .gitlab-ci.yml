        "root@${FIRST_NODE}" "pvesm status 2>/dev/null | grep -c pbs-nas" 2>/dev/null || echo "0")
      if framework/scripts/backup-now.sh --env prod --pin-out "$PIN_FILE"; then
        echo "Pre-deploy backup complete"
      elif [[ "$PBS_REGISTERED" -gt 0 ]]; then
