validate:nix-checks:
  stage: validate
  tags: [infra]
  script:
    - nix-instantiate --parse framework/nix/modules/base.nix
    - nix-instantiate --parse framework/nix/modules/certbot.nix
    - nix-instantiate --parse framework/nix/modules/gitlab-runner.nix
    - if [ -f tests/hil/.gitlab-ci-hil.yml ]; then nix-instantiate --parse framework/nix/modules/hil-boot-host.nix; fi
    - if [ -f tests/hil/.gitlab-ci-hil.yml ]; then nix-instantiate --parse framework/nix/pkgs/paia/default.nix; fi
    - if [ -f tests/hil/.gitlab-ci-hil.yml ]; then nix-instantiate --parse site/nix/lib/hil-boot-artifacts.nix; fi
    - nix build .#checks.x86_64-linux.source-filter --no-link
    - nix build .#packages.x86_64-linux.influxdb-image --no-link
    - nix build .#packages.x86_64-linux.grafana-image --no-link
    - nix build .#packages.x86_64-linux.workstation-image --no-link
    - nix eval .#nixosConfigurations.gitlab.config.system.build.toplevel.drvPath
    - if [ -f tests/hil/.gitlab-ci-hil.yml ]; then nix eval --impure .#nixosConfigurations.hil_boot.config.system.build.toplevel.drvPath; fi
    - nix eval .#nixosConfigurations.cicd.config.system.build.toplevel.drvPath
    - nix eval .#nixosConfigurations.dns_dev.config.system.build.toplevel.drvPath
    - nix eval .#nixosConfigurations.testapp_dev.config.system.build.toplevel.drvPath
    - nix eval .#nixosConfigurations.influxdb_dev.config.system.build.toplevel.drvPath
    - nix eval .#nixosConfigurations.grafana_dev.config.system.build.toplevel.drvPath
    - nix eval .#nixosConfigurations.workstation_dev.config.system.build.toplevel.drvPath
    - nix eval .#nixosConfigurations.workstation_prod.config.system.build.toplevel.drvPath
  rules:
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

