      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      exists:
        - tests/hil/.gitlab-ci-hil.yml
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
