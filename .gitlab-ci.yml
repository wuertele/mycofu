# .gitlab-ci.yml — Infrastructure CI/CD pipeline.
#
# Two-tier deployment model (architecture.md section 10.3):
# Tier 1 (pipeline): Data-plane VMs — DNS, Vault, Pebble, Gatus, apps.
# Tier 2 (workstation): Control-plane VMs — GitLab, CI/CD runner, PBS.
# The pipeline builds ALL roles (verifies buildability) but only deploys
# data-plane targets. Control-plane images are built and uploaded, ready
# for the operator to activate from the workstation.
#
# Branch model (architecture.md section 13.3):
# dev branch push  → build + upload + deploy-dev + test-dev
# prod branch push → build + upload + deploy-prod + test-prod
# MR (any target)  → validate + build (no deploy)
# Other branches   → no pipeline
#
# Runner: shell executor with all infrastructure tools (nix, tofu, sops, etc.)
# Secrets: SOPS age key at /run/secrets/sops/age-key on the runner VM.

# Prevent duplicate pipelines: only run for MR events or dev/prod pushes.
# Feature branch pushes without an MR produce no pipeline.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"
    - if: $CI_PIPELINE_SOURCE == "schedule"

stages:
  - validate
  - build
  - deploy-dev
  - deploy-control-plane-dev
  - test-dev
  - deploy-prod
  - deploy-control-plane-prod
  - test-prod
  - publish-github

variables:
  SOPS_AGE_KEY_FILE: /run/secrets/sops/age-key

# --- Validate ---

validate:plan:
  stage: validate
  tags: [infra]
  script:
    - echo "=== OpenTofu Init ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - echo "=== OpenTofu Validate ==="
    - framework/scripts/tofu-wrapper.sh validate
    - echo "=== OpenTofu Plan ==="
    - |
      IMAGE_VERSIONS="site/tofu/image-versions.auto.tfvars"
      if [[ ! -f "$IMAGE_VERSIONS" ]] || grep -q "Placeholder" "$IMAGE_VERSIONS" 2>/dev/null; then
        echo "image-versions.auto.tfvars not available (validate stage runs before build)."
        echo "Plan would show phantom drift for every VM. Skipping."
        echo "Accurate plan runs in the deploy stage with real image versions."
      else
        framework/scripts/tofu-wrapper.sh plan -no-color
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:provider-version:
  stage: validate
  tags: [infra]
  script:
    - echo "=== OpenTofu Init (provider ratchet) ==="
    - framework/scripts/tofu-wrapper.sh init -input=false
    - echo "=== Provider Version Ratchet ==="
    - bash tests/test_proxmox_provider_version.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:config:
  stage: validate
  tags: [infra]
  script:
    - echo "=== Config syntax check ==="
    - yq e '.' site/config.yaml > /dev/null
    - echo "Config YAML is valid"
    - echo "=== Site config semantic validation ==="
    - framework/scripts/validate-site-config.sh
    - echo "=== Zone file syntax check ==="
    - for f in site/dns/zones/*.yaml; do [ -f "$f" ] && yq e '.' "$f" > /dev/null; done || true
    - echo "All zone files valid"
    - echo "=== Vault requirements manifest syntax check ==="
    - for f in framework/catalog/*/vault-requirements.yaml framework/tofu/modules/*/vault-requirements.yaml; do [ -f "$f" ] && yq e '.' "$f" > /dev/null; done || true
    - echo "All vault requirements manifests valid"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

validate:approle-creds:
  stage: validate
  tags: [infra]
  script:
    - framework/scripts/check-approle-creds.sh
  # Only on deploy pipelines — MR pipelines don't deploy, and new apps
  # can't have credentials until after merge + onboarding from workstation.
  rules:
    - if: $CI_COMMIT_BRANCH == "dev"
    - if: $CI_COMMIT_BRANCH == "prod"

