# Sovereignty regression: `tofu init` on the runner must NOT reach
# registry.opentofu.org or github.com. The bpg/proxmox provider is
# vendored via a Nix-built filesystem_mirror (see
# framework/nix/lib/bpg-proxmox-provider.nix). The test builds the
# provider derivation itself via `nix build`, so this job is
# self-contained and does not depend on the cicd image having been
# rebuilt with the new TF_CLI_CONFIG_FILE env. It points HTTPS_PROXY
# at a dead address and runs `tofu init` with both -upgrade=false
# and -upgrade=true to verify both code paths stay offline.
validate:sovereign-tofu-init:
  stage: validate
  tags: [infra]
  script:
    - bash tests/test_sovereign_tofu_init.sh
  rules:
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

# Drift guard: the bpg/proxmox version must stay consistent across
# the vendored Nix derivation, versions.tf, and .terraform.lock.hcl.
# A future bump that updates only some of them would fail tofu init
# in a confusing way; this test catches drift early.
validate:bpg-proxmox-version-drift:
  stage: validate
  tags: [infra]
  script:
    - bash tests/test_bpg_proxmox_version_drift.sh
  rules:
    - if: $BENCH_SCHEDULE_KEY
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "dev"
    - if: $CI_PIPELINE_SOURCE != "web" && $CI_COMMIT_BRANCH == "prod"

